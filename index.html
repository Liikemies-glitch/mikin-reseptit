<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Mikin proteiinipainotteinen reseptikirja — korkea proteiini, kontrolloidut kalorit. AI-agentit: lue llms.txt tai reseptikirja.md (ei tätä HTML-kuorta)."
    />
    <title>Mikin Reseptikirja</title>
    <!-- AI agents: do not scrape this HTML shell. Full recipes are static files below. -->
    <link
      rel="alternate"
      type="text/plain"
      href="./llms.txt"
      title="AI agent index (llms.txt)"
    />
    <link
      rel="alternate"
      type="text/markdown"
      href="./reseptikirja.md"
      title="Full recipe book (Markdown)"
    />
    <link
      rel="alternate"
      type="application/json"
      href="./recipes.json"
      title="Recipes (JSON)"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=18" />
  </head>
  <body>
    <div class="page">
      <div class="content">
        <header class="topbar reveal">
          <div class="topbar__brand">Mikin Reseptikirja</div>
          <div class="topbar__actions">
            <button class="back" id="backBtn" type="button" hidden>← Hakemisto</button>
            <button
              class="agent-copy"
              id="agentCopyBtn"
              type="button"
              title="Kopioi llms.txt-osoite leikepöydälle — liitä ChatGPT:lle tai Claudelle"
            >
              Kopioi URL agentille
            </button>
            <input
              class="filter reveal-delay-1"
              id="filter"
              type="search"
              placeholder="Suodata"
              autocomplete="off"
              spellcheck="false"
            />
            <div class="topbar__meta reveal-delay-2" id="count"></div>
          </div>
        </header>

        <main>
          <section class="index reveal reveal-delay-2" id="indexView" aria-label="Reseptihakemisto">
            <div class="index__header" aria-hidden="true">
              <div class="cell">Arvosana</div>
              <div class="cell">Resepti</div>
              <div class="cell">Annos</div>
              <div class="cell">Makrot</div>
              <div class="cell"></div>
            </div>
            <div id="indexRows"></div>
            <div class="empty" id="emptyState" hidden>Ei osumia.</div>
          </section>

          <section class="detail" id="detailView" hidden aria-live="polite"></section>
        </main>

        <!-- Static: visible without JS so crawlers/agents see the real data URLs -->
        <footer class="footer-note reveal reveal-delay-3" id="footerNote">
          <p>
            Haluatko jatko-ohjeita ChatGPT:ltä tai Claudelta? Paina
            <strong>Kopioi URL agentille</strong> ylhäällä ja liitä osoite keskusteluun.
          </p>
          <p>
            Agenttilähteet:
            <a href="./llms.txt">llms.txt</a>,
            <a href="./reseptikirja.md">reseptikirja.md</a>,
            <a href="./recipes.json">recipes.json</a>,
            <a href="./AGENTS.md">AGENTS.md</a>.
          </p>
        </footer>

        <noscript>
          <section class="footer-note">
            <h2>Reseptisisältö (ilman JavaScriptiä)</h2>
            <p>
              Lue koko kirja:
              <a href="./reseptikirja.md">reseptikirja.md</a>
              · agentti-indeksi:
              <a href="./llms.txt">llms.txt</a>
              · JSON:
              <a href="./recipes.json">recipes.json</a>
            </p>
          </section>
        </noscript>
      </div>
    </div>

    <script src="./app.js?v=61" type="module"></script>
  </body>
</html>
